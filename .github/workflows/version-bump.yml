name: Bump Version and Tag

on:
  push:
    branches:
      - main
    paths:
      - "zamp_sdk/**"
      - "pyproject.toml"

env:
  ORG: Zampfi
  TARGET_REPO: zamp-sdk
  PYTHON_VERSION: "3.12"

jobs:
  bump-version:
    name: Bump Version
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.author.name != 'zampactionbot[bot]' }}
    permissions:
      contents: write

    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: ${{ env.ORG }}
          repositories: ${{ env.TARGET_REPO }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install poetry
        uses: snok/install-poetry@v1

      - name: Resolve release version
        id: bump
        run: |
          CURRENT=$(poetry version -s)
          if git rev-parse -q --verify "refs/tags/$CURRENT" >/dev/null; then
            # Current version is already released — auto patch-bump to the next one.
            poetry version patch
            NEW_VERSION=$(poetry version -s)
            echo "bumped=true" >> $GITHUB_OUTPUT
            echo "Patch-bumped $CURRENT -> $NEW_VERSION"
          else
            # pyproject holds an as-yet-unreleased version (e.g. a manual bump in the
            # merged PR) — release it verbatim instead of bumping past it.
            NEW_VERSION=$CURRENT
            echo "bumped=false" >> $GITHUB_OUTPUT
            echo "Releasing pyproject version as-is: $NEW_VERSION"
          fi
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Configure git
        run: |
          git config user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config user.email "224820880+zampactionbot[bot]@users.noreply.github.com"

      - name: Commit version bump
        if: steps.bump.outputs.bumped == 'true'
        run: |
          git add pyproject.toml
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create and push tag
        run: |
          git tag "${{ steps.bump.outputs.new_version }}"
          git push origin "${{ steps.bump.outputs.new_version }}"
